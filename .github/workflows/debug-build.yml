name: Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick python3 python3-pip cmake ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Run simple Gradle build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug --stacktrace 2>&1 | tee gradle-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Gradle exit code: $EXIT_CODE"

      - name: Check results
        run: |
          echo "=== Build outputs ==="
          find app/build -type f -name "*.apk" 2>/dev/null
          echo "=== Outputs directory ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          echo "=== Build log tail ==="
          tail -200 gradle-output.log | grep -E "(BUILD|error|Error|FAILED|failed)" | head -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 1
          if-no-files-found: error

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: gradle-output.log
          retention-days: 1
