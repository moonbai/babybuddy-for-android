name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive
          ls -la 3rdparty/zxing-cpp/

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick python3 python3-pip cmake ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Build APK
        run: |
          chmod +x gradlew
          chmod +x gradlew.bat
          echo "=== Running preBuild tasks ==="
          ./gradlew --no-daemon preBuild --stacktrace 2>&1 | tee prebuild-output.log || true
          echo "=== Running build tasks ==="
          ./gradlew --no-daemon assembleDebug -PskipIntegrationTests --stacktrace 2>&1 | tee gradle-output.log
          echo "===BUILD_STATUS==="
          grep -E "BUILD (SUCCESSFUL|FAILED)" gradle-output.log || echo "No build status found"
          echo "===PREBUILD_STATUS==="
          grep -E "BUILD (SUCCESSFUL|FAILED)|(error|Error|FAILED)" prebuild-output.log | head -20 || true

      - name: Find APK
        id: find_apk
        run: |
          echo "=== Checking for APK ==="
          APK_FILE=$(find app/build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ] && [ -f "$APK_FILE" ]; then
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
            echo "APK_FILE=$APK_FILE" >> $GITHUB_OUTPUT
            echo "APK_SIZE=$(du -h "$APK_FILE" | cut -f1)" >> $GITHUB_OUTPUT
            echo "Found APK: $APK_FILE"
            ls -la "$APK_FILE"
          else
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            echo "No APK found!"
            echo "=== Build directory contents ==="
            find app/build -type f 2>/dev/null | head -50 || echo "No files"
            echo "=== Last 50 lines of build log ==="
            tail -50 gradle-output.log
          fi

      - name: Upload APK
        if: steps.find_apk.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: gradle-output.log
          retention-days: 7

      - name: Success
        if: steps.find_apk.outputs.APK_FOUND == 'true'
        run: |
          echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** babybuddy-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.find_apk.outputs.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail
        if: steps.find_apk.outputs.APK_FOUND != 'true'
        run: |
          echo "❌ Build failed - no APK generated"
          tail -100 gradle-output.log
          exit 1
