name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          git submodule update --init --recursive
          ls -la 3rdparty/zxing-cpp/ 2>/dev/null | head -5 || echo "zxing submodule not found"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick jq python3 python3-pip python3-venv unzip

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          pip install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "=== Finding Android SDK ==="
          
          SDK_ROOT=""
          if [ -d "/opt/android-sdk" ]; then
            SDK_ROOT="/opt/android-sdk"
          elif [ -d "$HOME/android-sdk" ]; then
            SDK_ROOT="$HOME/android-sdk"
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            SDK_ROOT="/usr/local/lib/android/sdk"
          fi
          
          if [ -z "$SDK_ROOT" ]; then
            echo "ERROR: No pre-installed Android SDK found"
            echo "Creating new SDK at /opt/android-sdk"
            mkdir -p /opt/android-sdk
            SDK_ROOT="/opt/android-sdk"
          fi
          
          echo "Using SDK_ROOT: $SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          
          echo "=== SDK Directory Contents ==="
          ls -la "$SDK_ROOT/"
          
          echo "=== Finding sdkmanager ==="
          SDKMANAGER=""
          for path in \
            "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "$SDK_ROOT/cmdline-tools/12.0/bin/sdkmanager" \
            "$SDK_ROOT/cmdline-tools/11.0/bin/sdkmanager" \
            "$SDK_ROOT/tools/bin/sdkmanager" \
            "$SDK_ROOT/platform-tools/sdkmanager"
          do
            if [ -f "$path" ]; then
              SDKMANAGER="$path"
              echo "Found sdkmanager: $SDKMANAGER"
              break
            fi
          done
          
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found"
            echo "Downloading Android command line tools..."
            cd /tmp
            curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076700_latest.zip
            unzip -q cmdline-tools.zip
            mkdir -p "$SDK_ROOT/cmdline-tools"
            mv cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
            SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            cd -
          fi
          
          echo "sdkmanager: $SDKMANAGER"
          
          echo "=== Accepting Licenses ==="
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          
          echo "=== Current Platforms ==="
          ls -la "$SDK_ROOT/platforms/" 2>/dev/null || echo "No platforms"
          
          echo "=== Current Build-Tools ==="
          ls -la "$SDK_ROOT/build-tools/" 2>/dev/null || echo "No build-tools"
          
          echo "=== Current NDK ==="
          ls -la "$SDK_ROOT/ndk/" 2>/dev/null || echo "No NDK"
          
          echo "=== Installing Required SDK Components ==="
          $SDKMANAGER --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" 2>&1 || echo "Some components may already exist"
          
          echo "=== Final SDK Status ==="
          echo "Platforms: $(ls $SDK_ROOT/platforms/ 2>/dev/null || echo 'none')"
          echo "Build-Tools: $(ls $SDK_ROOT/build-tools/ 2>/dev/null || echo 'none')"
          echo "NDK: $(ls $SDK_ROOT/ndk/ 2>/dev/null || echo 'none')"

      - name: Set environment variables
        run: |
          for path in "/opt/android-sdk" "$HOME/android-sdk" "/usr/local/lib/android/sdk"; do
            if [ -d "$path" ]; then
              echo "ANDROID_HOME=$path" >> $GITHUB_ENV
              echo "ANDROID_SDK_ROOT=$path" >> $GITHUB_ENV
              echo "Set ANDROID_HOME=$path"
              break
            fi
          done
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Run Gradle build
        run: |
          echo "=== Starting Gradle Build ==="
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug -PskipIntegrationTests --stacktrace 2>&1 | tee gradle-output.log

      - name: Verify APK
        run: |
          echo "=== Checking for APK ==="
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "========================================"
            echo "✅ Debug APK built successfully!"
            echo "========================================"
            ls -la app/build/outputs/apk/debug/
            echo "APK Size: $(du -h app/build/outputs/apk/debug/*.apk | cut -f1)"
          else
            echo "❌ APK not found"
            echo "Looking for any APK files..."
            find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
            echo "Last 50 lines of gradle output:"
            tail -50 gradle-output.log 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(grep -oP 'versionName\s*=\s*\"\K[^\"]+' app/build.gradle)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Size:** $(du -h app/build/outputs/apk/debug/*.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
