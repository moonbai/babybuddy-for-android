name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Pandoc and other system requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick jq

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: 3.12

      - name: Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pip install cython

      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Check build prerequisites
        run: |
          bash check-build-prerequisites.sh

      - name: Run gradle build
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            ./gradlew --no-daemon assembleDebug -PskipIntegrationTests --stacktrace
            ls -la app/build/outputs/apk/debug/

      - name: Verify APK
        run: |
          echo "Checking for APK..."
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "✅ Debug APK built successfully!"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(grep -oP 'versionName\s*=\s*\"\K[^\"]+' app/build.gradle)" >> $GITHUB_STEP_SUMMARY
