name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive
          ls -la 3rdparty/zxing-cpp/
          ls -la 3rdparty/zxing-cpp/wrappers/android/zxingcpp/

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick python3 python3-pip cmake ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Check zxingcpp CMakeLists
        run: |
          echo "=== CMakeLists.txt content ==="
          cat 3rdparty/zxing-cpp/wrappers/android/zxingcpp/src/main/cpp/CMakeLists.txt

      - name: Check patched build.gradle
        run: |
          echo "=== patched build.gradle content ==="
          cat 3rdparty/patched-zxing-build.gradle

      - name: Build APK with verbose output
        run: |
          chmod +x gradlew
          chmod +x gradlew.bat
          echo "=== Listing available tasks ==="
          ./gradlew tasks --all 2>&1 | grep -i "assemble" | head -20 || true
          echo "=== Running assembleDebug ==="
          set +e
          ./gradlew --no-daemon clean assembleDebug -PskipIntegrationTests --info 2>&1 | tee gradle-output.log
          GRADLE_EXIT=$?
          set -e
          echo "=== Gradle exit code: $GRADLE_EXIT ==="
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "GRADLE_FAILED=true" >> $GITHUB_OUTPUT
            echo "Build failed with exit code $GRADLE_EXIT" | tee -a gradle-output.log
          fi
          echo "=== Checking if gradle-output.log exists ==="
          ls -la gradle-output.log 2>/dev/null || echo "gradle-output.log NOT CREATED"

      - name: Check build results
        id: check_build
        run: |
          echo "=== Searching for APK files ==="
          APK_LIST=$(find app/build -name "*.apk" -type f 2>/dev/null)
          if [ -n "$APK_LIST" ]; then
            echo "Found APK files:"
            echo "$APK_LIST"
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
          else
            echo "No APK files found"
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            echo "=== Checking gradle-output.log tail ==="
            if [ -f gradle-output.log ]; then
              tail -300 gradle-output.log | grep -E "(BUILD|error|Error|FAILED|assemble|cmake|CMake)" | head -100
            else
              echo "gradle-output.log not found"
            fi
            echo "=== Build directory structure ==="
            find app/build -type d 2>/dev/null | head -30
            echo "=== Build directory files ==="
            find app/build -type f 2>/dev/null | head -100
            echo "=== Listing intermediates directories ==="
            find app/build -type d -name "intermediates" 2>/dev/null | head -10
            echo "=== Listing outputs directories ==="
            find app/build -type d -name "outputs" 2>/dev/null | head -10
            echo "=== Last 300 lines of build log ==="
            tail -300 gradle-output.log
          fi

      - name: Upload APK
        if: steps.check_build.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload logs
        run: |
          echo "=== Checking for log file ==="
          if [ -f gradle-output.log ]; then
            echo "Log file exists, uploading..."
          else
            echo "Log file does NOT exist"
            echo "Build did not create log file" > gradle-output.log
          fi

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: gradle-output.log
          retention-days: 7

      - name: Build failed
        if: steps.check_build.outputs.APK_FOUND != 'true'
        run: |
          echo "❌ Build failed - no APK generated"
          exit 1
