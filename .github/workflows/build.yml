name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up submodules
        run: |
          git submodule update --init --recursive
          ls -la 3rdparty/zxing-cpp/ 2>/dev/null | head -3 || echo "zxing submodule not initialized"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick jq python3 python3-pip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug -PskipIntegrationTests 2>&1 | tee gradle-output.log

      - name: Check for APK
        id: check_apk
        run: |
          echo "=== Checking for APK files ==="
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
            echo "APK_FILE=$(ls app/build/outputs/apk/debug/*.apk | head -1)" >> $GITHUB_OUTPUT
            ls -la app/build/outputs/apk/debug/
            echo "APK_SIZE=$(du -h app/build/outputs/apk/debug/*.apk | cut -f1)" >> $GITHUB_OUTPUT
          else
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            echo "=== No APK found, checking for errors ==="
            tail -100 gradle-output.log 2>/dev/null | grep -E "(error|Error|ERROR|failed|Failed|FAILED|exception|Exception)" | head -20 || true
            find app/build -name "*.apk" 2>/dev/null || echo "No APK anywhere in build"
          fi

      - name: Upload APK artifact
        if: steps.check_apk.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Summary
        if: steps.check_apk.outputs.APK_FOUND == 'true'
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** babybuddy-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.check_apk.outputs.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if no APK
        if: steps.check_apk.outputs.APK_FOUND != 'true'
        run: |
          echo "❌ Build failed - no APK generated"
          echo "Last 100 lines of build log:"
          tail -100 gradle-output.log 2>/dev/null || true
          exit 1
