name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick python3 python3-pip jq

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          
          if [ -d "/usr/local/lib/android/sdk" ]; then
            echo "Using preinstalled Android SDK"
            ls -la /usr/local/lib/android/sdk/
            
            if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
              echo "Installing Android 35 platform..."
              yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
            fi
          fi
          
          echo "Accepting Android SDK licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          echo "Installed platforms:"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          
          echo "Installed build-tools:"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"

      - name: Set environment variables
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check build prerequisites
        run: bash check-build-prerequisites.sh

      - name: Build with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 3
          command: ./gradlew --no-daemon assembleDebug -PskipIntegrationTests --stacktrace
          retry_wait_seconds: 30
          retry_on: error
          on_retry_command: |
            echo "Build failed, retrying..."
            rm -rf ~/.gradle/caches/*/scripts*
            rm -rf app/build

      - name: Verify APK exists
        run: |
          echo "Checking for APK..."
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "✅ Debug APK built successfully!"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(grep -oP 'versionName\s*=\s*\"\K[^\"]+' app/build.gradle)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Size:** $(du -h app/build/outputs/apk/debug/*.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
