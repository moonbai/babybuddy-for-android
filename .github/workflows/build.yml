name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick cmake ninja-build unzip curl

      - name: Generate placeholder icons
        run: |
          echo "=== Generating placeholder drawable icons ==="
          mkdir -p app/src/main/res/drawable-mdpi
          mkdir -p app/src/main/res/drawable-hdpi
          mkdir -p app/src/main/res/drawable-xhdpi
          mkdir -p app/src/main/res/drawable-xxhdpi
          mkdir -p app/src/main/res/drawable-xxxhdpi
          
          for icon in pkg_bottle pkg_diaper pkg_sleep pkg_notes pkg_pumping pkg_crawl pkg_wet pkg_poop pkg_not_wet pkg_no_poop pkg_no_notes pkg_breast pkg_breast_left pkg_breast_right pkg_solid_food; do
            convert -size 24x24 xc:gray50 "app/src/main/res/drawable-mdpi/${icon}.png"
            convert -size 36x36 xc:gray50 "app/src/main/res/drawable-hdpi/${icon}.png"
            convert -size 48x48 xc:gray50 "app/src/main/res/drawable-xhdpi/${icon}.png"
            convert -size 72x72 xc:gray50 "app/src/main/res/drawable-xxhdpi/${icon}.png"
            convert -size 96x96 xc:gray50 "app/src/main/res/drawable-xxxhdpi/${icon}.png"
          done
          echo "=== Placeholder icons created ==="

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv cython pyyaml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Run Gradle build
        run: |
          chmod +x gradlew
          
          echo "=== Checking build prerequisites ==="
          echo "Java version:"
          java -version 2>&1 || true
          echo ""
          echo "Android SDK:"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not found"
          echo ""
          echo "Make version:"
          make --version 2>&1 | head -1 || echo "make not found"
          echo ""
          echo "ImageMagick version:"
          convert --version 2>&1 | head -1 || echo "convert not found"
          echo ""
          echo "pipenv version:"
          pipenv --version 2>&1 || echo "pipenv not found"
          echo ""
          
          echo "=== Running preBuild tasks first ==="
          ./gradlew --no-daemon preBuild 2>&1 | tee prebuild-output.log || true
          echo "=== PreBuild done ==="
          
          echo "=== Running full build ==="
          ./gradlew --no-daemon clean assembleDebug -PskipIntegrationTests 2>&1 | tee gradle-output.log || true
          echo "===BUILD_DONE==="

      - name: Check build results
        id: check_results
        run: |
          echo "=== Checking APK location ==="
          if [ -d "app/build/outputs/apk/debug" ]; then
            echo "Debug directory exists"
            ls -la app/build/outputs/apk/debug/ || true
          else
            echo "Debug directory does NOT exist"
          fi
          
          echo "=== Looking for APK files ==="
          APK_FOUND=false
          for apk in $(find app/build -name "*.apk" 2>/dev/null); do
            echo "Found APK: $apk"
            ls -la "$apk"
            APK_FOUND=true
          done
          
          if [ "$APK_FOUND" = "true" ]; then
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
            echo "Build SUCCESS - APK found!"
          else
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            echo "Build FAILED - No APK found"
            echo "=== Checking if app/build exists ==="
            ls -la app/build/ 2>/dev/null || echo "app/build directory does not exist"
            echo "=== PreBuild log summary ==="
            tail -100 prebuild-output.log 2>/dev/null || echo "No prebuild log"
            echo "=== Build log summary ==="
            tail -100 gradle-output.log 2>/dev/null || echo "No build log"
            echo "=== Looking for .so files ==="
            find app/build -name "*.so" 2>/dev/null | head -20 || echo "No .so files"
            echo "=== Checking for CMake native errors ==="
            grep -i "cmake\|ninja\|native\|zxing" gradle-output.log 2>/dev/null | tail -30 || echo "No CMake/native errors found"
          fi

      - name: Upload APK artifact
        if: steps.check_results.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            gradle-output.log
            prebuild-output.log
          retention-days: 7

      - name: Fail if no APK
        if: steps.check_results.outputs.APK_FOUND != 'true'
        run: |
          echo "❌ Build failed - no APK generated"
          echo "Check the gradle-build-logs artifact for details (includes prebuild and build logs)"
          exit 1
