name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_SDK_ROOT: '/opt/android-sdk'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick python3 python3-pip jq

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "========================================"
          echo "Setting up Android SDK"
          echo "========================================"
          
          if [ -d "/opt/android-sdk" ]; then
            echo "Using Android SDK from /opt/android-sdk"
            ANDROID_SDK_ROOT="/opt/android-sdk"
          elif [ -d "$HOME/android-sdk" ]; then
            echo "Using Android SDK from $HOME/android-sdk"
            ANDROID_SDK_ROOT="$HOME/android-sdk"
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            echo "Using Android SDK from /usr/local/lib/android/sdk"
            ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          else
            echo "No pre-installed Android SDK found, will download..."
            mkdir -p $HOME/android-sdk
            ANDROID_SDK_ROOT="$HOME/android-sdk"
            cd $HOME/android-sdk
            curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076700_latest.zip
            unzip -q cmdline-tools.zip
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
            cd -
          fi
          
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          
          echo "Setting up PATH..."
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools"
          echo "PATH updated"
          
          echo "Checking SDK manager..."
          ls -la $ANDROID_HOME/cmdline-tools/latest/bin/ 2>/dev/null || ls -la $ANDROID_HOME/cmdline-tools/*/bin/ 2>/dev/null || echo "No cmdline-tools found"
          
          if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          elif [ -f "$ANDROID_HOME/cmdline-tools/12.0/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/12.0/bin/sdkmanager"
          elif [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          else
            echo "sdkmanager not found, trying to find it..."
            SDKMANAGER=$(find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null | head -1)
            if [ -z "$SDKMANAGER" ]; then
              echo "ERROR: sdkmanager not found!"
              exit 1
            fi
          fi
          
          echo "Using sdkmanager: $SDKMANAGER"
          
          echo "Accepting licenses..."
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          
          echo "Checking installed platforms..."
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms installed"
          
          echo "Installing required SDK components..."
          $SDKMANAGER --install "platforms;android-35" "build-tools;35.0.0" 2>&1 || echo "platforms;android-35 may already be installed"
          
          echo "Checking for NDK..."
          if [ -d "$ANDROID_HOME/ndk" ]; then
            echo "NDK directory found:"
            ls -la $ANDROID_HOME/ndk/
            NDK_VERSION=$(ls $ANDROID_HOME/ndk/ 2>/dev/null | head -1)
            echo "NDK version: $NDK_VERSION"
          else
            echo "No NDK found, installing..."
            $SDKMANAGER --install "ndk;27.0.12077973" 2>&1 || echo "NDK installation attempted"
          fi
          
          echo "Final SDK structure:"
          ls -la $ANDROID_HOME/
          echo "========================================"
          echo "SDK Setup Complete"
          echo "========================================"

      - name: Set environment variables
        run: |
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Gradle build
        run: |
          echo "========================================"
          echo "Starting Gradle Build"
          echo "========================================"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          
          export ANDROID_HOME="/opt/android-sdk"
          export ANDROID_SDK_ROOT="/opt/android-sdk"
          
          echo "Checking NDK before build..."
          ls -la $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDK directory"
          
          echo "Starting build..."
          ./gradlew --no-daemon assembleDebug -PskipIntegrationTests --stacktrace 2>&1

      - name: Verify APK exists
        run: |
          echo "Checking for APK..."
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "========================================"
            echo "✅ Debug APK built successfully!"
            echo "========================================"
            ls -la app/build/outputs/apk/debug/
            echo "APK Size: $(du -h app/build/outputs/apk/debug/*.apk | cut -f1)"
          else
            echo "❌ APK not found in expected location"
            find app/build -name "*.apk" 2>/dev/null || echo "No APK found at all"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(grep -oP 'versionName\s*=\s*\"\K[^\"]+' app/build.gradle)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** [Download](./actions/runs/${{ github.run_id }}#artifact-${{ github.run_attempt }})" >> $GITHUB_STEP_SUMMARY
