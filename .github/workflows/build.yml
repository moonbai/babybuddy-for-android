name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick cmake ninja-build unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv cython

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Run Gradle build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleDebug -PskipIntegrationTests 2>&1 | tee gradle-output.log || true
          echo "===BUILD_DONE==="

      - name: Check build results
        id: check_results
        run: |
          echo "=== Checking APK location ==="
          if [ -d "app/build/outputs/apk/debug" ]; then
            echo "Debug directory exists"
            ls -la app/build/outputs/apk/debug/ || true
          else
            echo "Debug directory does NOT exist"
          fi
          
          echo "=== Looking for APK files ==="
          APK_FOUND=false
          for apk in $(find app/build -name "*.apk" 2>/dev/null); do
            echo "Found APK: $apk"
            ls -la "$apk"
            APK_FOUND=true
          done
          
          if [ "$APK_FOUND" = "true" ]; then
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
            echo "Build SUCCESS - APK found!"
          else
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            echo "Build FAILED - No APK found"
            echo "=== Checking if app/build exists ==="
            ls -la app/build/ 2>/dev/null || echo "app/build directory does not exist"
            echo "=== Build log summary ==="
            tail -100 gradle-output.log 2>/dev/null || echo "No build log"
            echo "=== Looking for .so files ==="
            find app/build -name "*.so" 2>/dev/null | head -20 || echo "No .so files"
          fi

      - name: Upload APK artifact
        if: steps.check_results.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-output.log
          retention-days: 7

      - name: Fail if no APK
        if: steps.check_results.outputs.APK_FOUND != 'true'
        run: |
          echo "❌ Build failed - no APK generated"
          echo "Check the gradle-build-log artifact for details"
          exit 1
