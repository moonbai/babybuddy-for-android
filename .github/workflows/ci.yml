name: CI checks

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Pandoc and other system requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pip install cython

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up submodules
        run: |
          git submodule update --init --recursive
          ls -la 3rdparty/zxing-cpp/ 2>/dev/null | head -3 || echo "zxing submodule not initialized"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Run gradle build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon build -PskipIntegrationTests 2>&1 | tee gradle-output.log

      - name: Run post-build checks
        if: success()
        run: |
          bash tools/workflows/check-translations.sh 2>/dev/null || echo "Translation checks skipped"
