name: CI checks

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Pandoc and other system requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make gcc g++ imagemagick

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: 3.12

      - name: Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pip install cython

      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin' # Note to self: This IS OpenJDK
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Check build prerequisites
        run: |
          bash check-build-prerequisites.sh

      - name: Run gradle build
        run: |
          ./gradlew --no-daemon build -PskipIntegrationTests

      - name: Check for APK files
        id: check_apk
        run: |
          echo "=== Checking for APK files ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK directory not found"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK directory not found"
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
            echo "APK_FILE=$(ls app/build/outputs/apk/debug/*.apk | head -1)" >> $GITHUB_OUTPUT
            ls -la app/build/outputs/apk/debug/
            echo "APK_SIZE=$(du -h app/build/outputs/apk/debug/*.apk | cut -f1)" >> $GITHUB_OUTPUT
          else
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Debug APK artifact
        if: steps.check_apk.outputs.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: babybuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Run post-build checks
        run: |
          bash tools/workflows/check-translations.sh
